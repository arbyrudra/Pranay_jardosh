<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Pranay Jardosh | P.P. Savani Group</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root{
    --orange: #FF8C00;
    --navy: #001f54;
    --light-navy: #003399;
    --dark-bg: #0f172a;
    --glass: rgba(255, 255, 255, 0.1);
    --card-shadow: 0 20px 40px rgba(0,0,0,0.3);
}
html,body{
    margin:0; width:100%; height:100%; background: var(--dark-bg);
    display:flex; justify-content:center; align-items:center;
    font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
    overflow:hidden;
}
#container{ width:360px; height:640px; position: relative; background: #fff; border-radius: 40px; overflow: hidden; box-shadow: var(--card-shadow); border: 8px solid #1e293b; }

/* ================= PROFESSIONAL FIRST PAGE UI ================= */
#director-card{ width:100%; height:100%; background: #f8fafc; display:flex; flex-direction:column; position: absolute; top:0; left:0; z-index: 10; }
.dir-header { 
    background: linear-gradient(135deg, var(--navy) 0%, #003366 100%); 
    height: 240px; width: 100%; position: relative; 
    display: flex; justify-content: center; align-items: center; 
}
.dir-header::after { 
    content: ""; position: absolute; bottom: -2px; left: 0; width: 100%; height: 50px; 
    background: #f8fafc; clip-path: ellipse(60% 100% at 50% 100%); 
}
.profile-img { 
    width: 130px; height: 130px; border-radius: 50%; border: 6px solid #fff; 
    object-fit: cover; box-shadow: 0 10px 25px rgba(0,0,0,0.15); z-index: 5; 
}
.dir-content { padding: 15px 24px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; align-items: center; }
.dir-content h2 { margin: 5px 0 8px; color: var(--navy); font-size: 24px; font-weight: 800; letter-spacing: -0.5px; width: 100%; }
.role-tag { 
    background: rgba(255, 140, 0, 0.15); color: var(--orange); 
    padding: 6px 20px; border-radius: 50px; font-weight: 800; 
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    display: inline-block; margin-bottom: 10px;
}
.dept { font-size: 15px; color: #475569; font-weight: 600; margin-bottom: 20px; line-height: 1.2; }

/* FLIP PHONE ICON TO FACE RIGHT */
.fa-phone-alt { transform: scaleX(-1); }

.contact-card { 
    text-align: left; background: #fff; border-radius: 24px; padding: 15px; 
    box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid #edf2f7; width: 100%; box-sizing: border-box;
}
.info-row { 
    display: flex; align-items: center; gap: 12px; padding: 10px;
    margin-bottom: 8px; text-decoration: none; border-radius: 12px;
    transition: background 0.2s;
}
.info-row:active { background: #f1f5f9; }
.icon-box { 
    width: 36px; height: 36px; background: #eff6ff; color: var(--navy); 
    border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; 
}
.info-text span { font-size: 13px; color: #334155; font-weight: 600; }
/* 1. Updated dir-content to handle the layout */
.dir-content { 
    padding: 20px 24px; 
    text-align: center; 
    flex: 1; 
    display: flex; 
    flex-direction: column; 
    align-items: center; /* Ensures children stay centered */
    box-sizing: border-box;
}

/* 2. Updated save-btn to fit perfectly */
.save-btn { 
    width: 100%; 
    background: var(--orange); 
    color: #fff; 
    border: none; 
    padding: 16px; 
    border-radius: 18px; 
    font-weight: 800; 
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3); 
    margin: 5px 0; /* Changed to margin top and bottom */
    box-sizing: border-box; 
}

/* 3. Updated view-branches-bar to stay at the very bottom */
.view-branches-bar { 
    background: var(--navy); 
    color: #fff; 
    width: 100%; 
    padding: 20px 0; 
    font-weight: 700; 
    text-align: center; 
    cursor: pointer; 
    border: none;
    font-size: 14px; 
    letter-spacing: 0.5px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: auto; /* This forces it to the bottom of the container */
}

/* ================= SEARCH & LIST VIEW ================= */
#list-view { width:100%; height:100%; background:#f8f9fa; display:none; flex-direction:column; position:absolute; top:0; left:0; z-index:20; }
.header-bar { padding:45px 20px 15px; background:var(--navy); color:white; }
.search-container { position: relative; margin-top: 15px; }
.search-input {
    width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px; padding: 12px 15px 12px 40px; color: white; outline: none; box-sizing: border-box;
}
.search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.5); font-size: 14px; }

.scroll-area { flex: 1; overflow-y: auto; padding: 20px 15px; }
.list-item { background: white; padding: 18px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid #eee; font-weight: 700; color: var(--navy); }
.grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.grid-item { background: white; padding: 20px 10px; border-radius: 20px; text-align: center; border: 1px solid #eee; display: flex; flex-direction: column; align-items: center; }
.grid-item img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 10px; }
.grid-item span { 
    font-weight: 800; 
    font-size: 11px; 
    color: var(--navy); 
    line-height: 1.4; /* Adds space between the two lines */
    display: block;   /* Ensures the span behaves like a block for the break */
    margin-top: 5px;
}

/* ================= DETAIL VIEW ================= */
#card-detail-view { width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; position: absolute; top:0; left:0; z-index: 30; justify-content: center; align-items: center; }
.card-wrapper { width: 320px; height: 520px; perspective: 1500px; position: relative; }
.card-inner { width: 100%; height: 100%; position: relative; transition: transform 0.6s; transform-style: preserve-3d; }
.card-inner.flipped { transform: rotateY(180deg); }
.card-front, .card-back { position: absolute; width: 100%; height: 100%; border-radius: 30px; backface-visibility: hidden; overflow: hidden; display: flex; flex-direction: column; background: white; }
.card-back { background: linear-gradient(160deg, #001f54 0%, #000 100%); color: white; transform: rotateY(180deg); padding: 35px 25px; box-sizing: border-box; }
.sketch-box { border: 2px solid rgba(255,255,255,0.3); border-radius: 15px; padding: 15px; margin-bottom: 15px; text-align: center; }
.sketch-label { font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.7); margin-bottom: 4px; display: block; }
.sketch-value { font-size: 16px; font-weight: 700; color: #fff; white-space: pre-line; word-break: break-word; line-height: 1.2; }
.social-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; }
.s-link { background: var(--glass); aspect-ratio: 1; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; border: 1px solid rgba(255,255,255,0.1); font-size: 18px; }
.website-btn { background: var(--orange); color: white; text-align: center; padding: 16px; border-radius: 15px; text-decoration: none; font-weight: 800; font-size: 16px; margin-top: auto; }
.front-info { padding: 15px 20px; text-align: center; background: var(--orange); color: white; margin-top: -20px; min-height: 120px; display: flex; flex-direction: column; justify-content: center; border-radius: 30px 30px 0 0; }
.card-back-btn { position: absolute; top: -45px; left: 0; color: white; cursor: pointer; font-weight: 600; }
#contact-picker { display: none; position: absolute; bottom: 0; left: 0; width: 100%; background: white; border-radius: 25px 25px 0 0; z-index: 100; padding: 20px; box-sizing: border-box; }
.picker-option { display: flex; align-items: center; gap: 15px; padding: 15px; background: #f0f4f8; border-radius: 12px; margin-bottom: 10px; text-decoration: none; color: var(--navy); font-weight: 700; }
</style>
</head>
<body>

];

let isGridView = false;

function filterBranches() {
    const term = document.getElementById('branch-search').value.toLowerCase().replace(/[^a-z0-9]/g, '');
    const filtered = currentData.filter(b => {
        const normalizedName = b.name.toLowerCase().replace(/[^a-z0-9]/g, '');
        return normalizedName.includes(term);
    });
    renderList(filtered, isGridView, true);
}

function handleFlipTap(e) {
    if (e.target.closest('.social-grid') || e.target.closest('#contact-picker') || e.target.closest('.website-btn')) return;
    document.getElementById('card-inner').classList.toggle('flipped');
}

function handlePhoneClick(event, phoneData) {
    event.stopPropagation();
    const list = document.getElementById('picker-options-list');
    const numbers = Array.isArray(phoneData) ? phoneData : [phoneData];
    list.innerHTML = `<div style="text-align:center; font-weight:800; margin-bottom:15px; color:var(--navy)">CALL BRANCH</div>` + 
        numbers.map(num => `<a href="tel:${num.replace(/\s/g,'')}" class="picker-option"><i class="fas fa-phone-alt"></i> ${num}</a>`).join('');
    document.getElementById('contact-picker').style.display = 'block';
}

function hidePicker() { document.getElementById('contact-picker').style.display = 'none'; }

function openCard(b) {
    hidePicker();
    document.getElementById('card-inner').classList.remove('flipped');
    document.getElementById('card-front').innerHTML = `
        <div style="flex:1.6; display:flex; align-items:center; justify-content:center; padding:20px;"><img src="${b.img}" style="max-width:80%;"></div>
        <div class="front-info">
            <h2 style="font-size:16px; margin:0;">${b.name}</h2>
            <p style="font-size:11px; opacity:0.8; margin-top:5px;">${b.addr}</p>
            <div style="font-size:10px; background:rgba(255,255,255,0.2); padding:6px 12px; border-radius:20px; margin-top:10px; align-self:center; font-weight:700;">TAP TO SEE DETAILS</div>
        </div>`;
    
    document.getElementById('card-back').innerHTML = `
        <div class="sketch-box"><span class="sketch-value">${b.grade}</span></div>
        <div class="sketch-box"><span class="sketch-value">${b.branch_type}</span></div>
        <div class="social-grid">
            <a href="${b.links.fb}" class="s-link"><i class="fab fa-facebook-f"></i></a>
            <a href="${b.links.ig}" class="s-link"><i class="fab fa-instagram"></i></a>
            <a href="${b.links.yt}" class="s-link"><i class="fab fa-youtube"></i></a>
            <div class="s-link" onclick='handlePhoneClick(event, ${JSON.stringify(b.links.phone)})'><i class="fas fa-phone-alt"></i></div>
            <a href="${b.links.map}" class="s-link"><i class="fas fa-map-marker-alt"></i></a>
        </div>
        <a href="${b.links.web || '#'}" class="website-btn" style="${!b.links.web ? 'opacity:0.5; pointer-events:none;' : ''}">Website</a>`;
        
    document.getElementById('card-detail-view').style.display = 'flex';
}

function renderList(data, isGrid = false, isFiltering = false) {
    const list = document.getElementById('list-container');
    if (!isFiltering) {
        currentData = data;
        isGridView = isGrid;
    }
    
    if(isGrid) {
        list.innerHTML = `<div class="grid-container">` + data.map(b => `
            <div class="grid-item" onclick='openCard(${JSON.stringify(b)})'>
                <img src="${b.img}" onerror="this.src='https://via.placeholder.com/65'">
                <span>${b.name}</span>
            </div>`).join('') + `</div>`;
    } else {
        list.innerHTML = data.map(b => `
            <div class="list-item" onclick='handleBranchClick(${JSON.stringify(b)})'>
                <span>${b.name}</span><i class="fas fa-chevron-right"></i>
            </div>`).join('');
    }
}

function handleBranchClick(b) {
    if(b.isCategory) {
        document.getElementById('list-title').innerText = "CHOOSE UNIT";
        document.getElementById('branch-search').value = "";
        renderList(b.subBranches, true);
    } else { openCard(b); }
}

function openListView() { 
    document.getElementById('list-title').innerText = "BRANCHES";
    document.getElementById('branch-search').value = "";
    document.getElementById('search-box-wrapper').style.display = 'block';
    renderList(branches, false); 
    document.getElementById('list-view').style.display = 'flex'; 
}
function closeListView() { document.getElementById('list-view').style.display = 'none'; }
function closeCard() { document.getElementById('card-detail-view').style.display = 'none'; }
function downloadVCard() {
    const vcard = `BEGIN:VCARD\nVERSION:3.0\nFN:Pranay Jardosh\nTEL;TYPE=CELL:+9199251 66695\nEND:VCARD`;
    const blob = new Blob([vcard], { type: 'text/vcard' });
    const url = window.URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url; link.download = 'Pranay_Jardosh.vcf'; link.click();
}
</script>
